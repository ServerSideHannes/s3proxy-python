# S3Proxy Helm Chart Values

replicaCount: 3

image:
  repository: ghcr.io/YOUR_USERNAME/sseproxy-python
  tag: latest
  pullPolicy: IfNotPresent

# S3 configuration (used when minio.enabled=false)
s3:
  host: "s3.amazonaws.com"
  region: "us-east-1"

server:
  port: 4433
  noTls: true

performance:
  throttlingRequestsMax: 10
  maxUploadSizeMb: 45

# Embedded MinIO (set enabled: false to use external S3)
minio:
  enabled: true
  image:
    repository: minio/minio
    tag: latest
    pullPolicy: IfNotPresent
  rootUser: "minioadmin"
  rootPassword: "minioadmin"
  resources:
    requests:
      cpu: "50m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"

# External Redis (for managed services)
externalRedis:
  url: ""
  uploadTtlHours: 24

# Redis HA (embedded)
redis-ha:
  enabled: true
  replicas: 3
  existingSecret: ""

  persistentVolume:
    enabled: true
    size: 10Gi
    storageClass: ""

  haproxy:
    enabled: true
    replicas: 2
    resources:
      requests:
        cpu: "50m"
        memory: "64Mi"
      limits:
        cpu: "200m"
        memory: "128Mi"

  sentinel:
    port: 26379
    quorum: 2
    config:
      down-after-milliseconds: 10000
      failover-timeout: 180000
      parallel-syncs: 5

  redis:
    port: 6379
    config:
      maxmemory-policy: volatile-lru
      min-replicas-to-write: 1
      min-replicas-max-lag: 5

  auth: false
  authKey: ""
  hardAntiAffinity: true

  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"

# Secrets (use existing secret in production)
secrets:
  existingSecrets:
    enabled: false
    name: ""
    keys:
      encryptKey: "S3PROXY_ENCRYPT_KEY"
      awsAccessKeyId: "AWS_ACCESS_KEY_ID"
      awsSecretAccessKey: "AWS_SECRET_ACCESS_KEY"

  encryptKey: ""
  awsAccessKeyId: ""
  awsSecretAccessKey: ""

logLevel: "INFO"

resources:
  requests:
    cpu: "100m"
    memory: "512Mi"
  limits:
    cpu: "1000m"
    memory: "1Gi"

service:
  type: ClusterIP
  port: 4433
