# S3Proxy Helm Chart Values

replicaCount: 3

image:
  repository: ghcr.io/ServerSideHannes/s3proxy-python
  tag: latest
  pullPolicy: IfNotPresent

# S3 backend configuration
s3:
  host: "s3.amazonaws.com"
  region: "us-east-1"

server:
  port: 4433
  noTls: true

performance:
  throttlingRequestsMax: 10
  maxUploadSizeMb: 45

# External Redis (for managed services)
externalRedis:
  url: ""  # e.g., "redis://host:6379/0" or "redis://:password@host:6379/0"
  uploadTtlHours: 24
  # Password can be provided in one of two ways:
  #   1. Embedded in URL above: redis://:password@host:6379/0
  #   2. Via existingSecret (recommended - keeps password out of configmap)
  existingSecret: ""
  passwordKey: "redis-password"

# Redis HA (embedded)
redis-ha:
  enabled: true
  replicas: 3
  # Redis authentication - when auth: true, you MUST provide one of:
  #   existingSecret: name of a pre-existing secret (recommended for production)
  #   redisPassword: password value (chart will create a secret)
  # The secret key name is configured via authKey (default: "auth")
  auth: false
  redisPassword: ""
  existingSecret: ""
  authKey: "auth"

  persistentVolume:
    enabled: true
    size: 10Gi
    storageClass: ""

  haproxy:
    enabled: true
    replicas: 2
    resources:
      requests:
        cpu: "50m"
        memory: "64Mi"
      limits:
        cpu: "200m"
        memory: "128Mi"

  sentinel:
    port: 26379
    quorum: 2
    config:
      down-after-milliseconds: 10000
      failover-timeout: 180000
      parallel-syncs: 5

  redis:
    port: 6379
    config:
      maxmemory-policy: volatile-lru
      min-replicas-to-write: 1
      min-replicas-max-lag: 5

  hardAntiAffinity: true

  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"

# Secrets (use existing secret in production)
secrets:
  existingSecrets:
    enabled: false
    name: ""
    keys:
      encryptKey: "S3PROXY_ENCRYPT_KEY"
      awsAccessKeyId: "AWS_ACCESS_KEY_ID"
      awsSecretAccessKey: "AWS_SECRET_ACCESS_KEY"

  encryptKey: ""
  awsAccessKeyId: ""
  awsSecretAccessKey: ""

logLevel: "INFO"

resources:
  requests:
    cpu: "100m"
    memory: "512Mi"
  limits:
    cpu: "100m"
    memory: "512Mi"

service:
  type: ClusterIP
  port: 4433

# Gateway creates internal DNS alias (no external DNS setup needed)
# Internal: gateway.enabled=true, ingress.enabled=true -> s3-gateway.<namespace>
# External: gateway.enabled=false, ingress.enabled=true, hosts=[...] -> your-domain.com (requires DNS)
gateway:
  enabled: false
  serviceName: s3-gateway
  ingressService: ingress-nginx-controller.ingress-nginx.svc.cluster.local

# Pod scheduling
nodeSelector: {}

tolerations: []

affinity: {}
  # Example: prefer spreading across nodes
  # podAntiAffinity:
  #   preferredDuringSchedulingIgnoredDuringExecution:
  #     - weight: 100
  #       podAffinityTerm:
  #         labelSelector:
  #           matchLabels:
  #             app: s3proxy-python
  #         topologyKey: kubernetes.io/hostname

topologySpreadConstraints: []
  # Example: spread across zones
  # - maxSkew: 1
  #   topologyKey: topology.kubernetes.io/zone
  #   whenUnsatisfiable: ScheduleAnyway
  #   labelSelector:
  #     matchLabels:
  #       app: s3proxy-python

ingress:
  enabled: false
  className: "nginx"
  annotations:
    nginx.ingress.kubernetes.io/proxy-buffering: "off"
    nginx.ingress.kubernetes.io/proxy-request-buffering: "off"
    nginx.ingress.kubernetes.io/proxy-body-size: "0"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/upstream-keepalive-connections: "100"
  tls: []
  hosts: []