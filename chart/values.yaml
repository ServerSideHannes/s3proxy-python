# S3Proxy Helm Chart Values

replicaCount: 3

image:
  repository: ghcr.io/ServerSideHannes/s3proxy-python
  tag: latest
  pullPolicy: IfNotPresent

s3:
  host: "s3.amazonaws.com"
  region: "us-east-1"

server:
  port: 4433
  noTls: true

performance:
  memoryLimitMb: 64

externalRedis:
  url: ""
  uploadTtlHours: 24
  existingSecret: ""
  passwordKey: "redis-password"

redis-ha:
  enabled: true
  replicas: 1
  auth: false
  redisPassword: ""
  existingSecret: ""
  authKey: "auth"

  persistentVolume:
    enabled: true
    size: 10Gi
    storageClass: ""

  haproxy:
    enabled: true
    replicas: 2
    # CRITICAL: Health check and timeout settings for high load tolerance
    # Redis can be slow during BGSAVE - don't mark as DOWN too quickly
    checkInterval: 5s         # Check every 5 seconds (default: 1s)
    timeout:
      check: "10s"            # Wait 10s for health check response (default: 2s)
      server: "60s"           # Server response timeout (default: 30s)
      client: "60s"           # Client connection timeout (default: 30s)
    resources:
      requests:
        cpu: "50m"
        memory: "64Mi"
      limits:
        cpu: "200m"
        memory: "128Mi"

  sentinel:
    port: 26379
    quorum: 2
    config:
      down-after-milliseconds: 10000
      failover-timeout: 180000
      parallel-syncs: 5

  redis:
    port: 6379
    config:
      maxmemory: "200mb"
      maxmemory-policy: noeviction

      min-replicas-to-write: 2
      min-replicas-max-lag: 10

  hardAntiAffinity: true

  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "256Mi"

secrets:
  existingSecrets:
    enabled: false
    name: ""
    keys:
      encryptKey: "S3PROXY_ENCRYPT_KEY"
      awsAccessKeyId: "AWS_ACCESS_KEY_ID"
      awsSecretAccessKey: "AWS_SECRET_ACCESS_KEY"

  encryptKey: ""
  awsAccessKeyId: ""
  awsSecretAccessKey: ""

admin:
  enabled: false
  path: "/admin"

logLevel: "DEBUG"

resources:
  requests:
    cpu: "100m"
    memory: "512Mi"
  limits:
    cpu: "500m"
    memory: "512Mi"

service:
  type: ClusterIP
  port: 4433

gateway:
  enabled: false
  serviceName: s3-gateway
  ingressService: ingress-nginx-controller.ingress-nginx.svc.cluster.local

nodeSelector: {}

tolerations: []

affinity: {}

topologySpreadConstraints: []

# Pod Disruption Budget - ensures HA during node maintenance/upgrades
podDisruptionBudget:
  enabled: true
  minAvailable: 1
  # maxUnavailable: 1  # Alternative to minAvailable

ingress:
  enabled: false
  className: "nginx"
  annotations:
    nginx.ingress.kubernetes.io/proxy-buffering: "off"
    nginx.ingress.kubernetes.io/proxy-request-buffering: "off"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
  tls: []
  hosts: []