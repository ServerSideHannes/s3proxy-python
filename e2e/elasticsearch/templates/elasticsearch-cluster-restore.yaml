apiVersion: elasticsearch.k8s.elastic.co/v1
kind: Elasticsearch
metadata:
  name: ${CLUSTER_NAME}-restored
spec:
  version: 9.2.4
  nodeSets:
    - name: default
      count: 3
      config:
        node.store.allow_mmap: false
        s3.client.default.endpoint: "s3-gateway.s3proxy:80"
        s3.client.default.protocol: "http"
        s3.client.default.path_style_access: true
      podTemplate:
        spec:
          containers:
            - name: elasticsearch
              env:
                - name: ES_JAVA_OPTS
                  value: "-Xms1g -Xmx1g"
              resources:
                requests:
                  memory: 2Gi
                  cpu: 500m
                limits:
                  memory: 3Gi
                  cpu: 2
      volumeClaimTemplates:
        - metadata:
            name: elasticsearch-data
          spec:
            accessModes:
              - ReadWriteOnce
            resources:
              requests:
                storage: 20Gi
  secureSettings:
    - secretName: s3-credentials
