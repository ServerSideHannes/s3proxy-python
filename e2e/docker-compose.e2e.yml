services:
  redis:
    image: redis:7-alpine
    container_name: s3proxy-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: s3proxy-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5

  s3proxy:
    image: s3proxy:latest
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: s3proxy-server
    ports:
      - "8080:4433"
    environment:
      # S3 backend configuration
      S3PROXY_HOST: http://minio:9000
      S3PROXY_REGION: us-east-1

      # Encryption key (32 bytes for AES-256)
      S3PROXY_ENCRYPT_KEY: test-key-for-e2e-testing-32bytes

      # AWS credentials for MinIO access
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin

      # Concurrency limits
      S3PROXY_MAX_CONCURRENT_UPLOADS: "5"
      S3PROXY_MAX_CONCURRENT_DOWNLOADS: "5"

      # Server configuration
      S3PROXY_NO_TLS: "true"
      S3PROXY_LOG_LEVEL: INFO

      # Redis configuration
      S3PROXY_REDIS_URL: redis://redis:6379/0
    depends_on:
      minio:
        condition: service_healthy
      redis:
        condition: service_healthy
    # Hard memory limit (same as Kubernetes)
    mem_limit: 512m
    memswap_limit: 512m  # Same as mem_limit = no swap = hard OOM kill
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4433/readyz"]
      interval: 5s
      timeout: 10s
      retries: 5

volumes:
  minio_data:
