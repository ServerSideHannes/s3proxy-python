services:
  redis:
    image: redis:7-alpine
    container_name: s3proxy-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: s3proxy-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5

  s3proxy:
    image: s3proxy:latest
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: s3proxy-server
    ports:
      - "8080:4433"
    environment:
      S3PROXY_HOST: http://minio:9000
      S3PROXY_REGION: us-east-1
      S3PROXY_ENCRYPT_KEY: test-key-for-e2e-testing-32bytes
      S3PROXY_NO_TLS: "true"
      S3PROXY_LOG_LEVEL: INFO
      S3PROXY_REDIS_URL: redis://redis:6379/0
      S3PROXY_THROTTLING_REQUESTS_MAX: "10"
      S3PROXY_MAX_UPLOAD_SIZE_MB: "45"
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
    depends_on:
      minio:
        condition: service_healthy
      redis:
        condition: service_healthy
    mem_limit: 1280m
    memswap_limit: 1280m
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4433/readyz"]
      interval: 5s
      timeout: 10s
      retries: 5

volumes:
  minio_data:
