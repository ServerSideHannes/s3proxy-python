apiVersion: batch/v1
kind: Job
metadata:
  name: s3-tests-runner
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 3600
  template:
    spec:
      restartPolicy: Never
      containers:
      - name: s3-tests
        image: python:3.12-slim
        volumeMounts:
        - name: config
          mountPath: /config
        - name: results
          mountPath: /results
        env:
        - name: S3TEST_CONF
          value: /config/s3tests.conf
        command:
        - /bin/bash
        - -c
        - |
          set -e

          echo "=== Installing dependencies ==="
          apt-get update -qq && apt-get install -y -qq git > /dev/null

          echo "=== Cloning s3-tests ==="
          git clone --depth 1 https://github.com/ceph/s3-tests.git /s3-tests
          cd /s3-tests

          echo "=== Installing s3-tests ==="
          pip install --quiet -r requirements.txt
          pip install --quiet -e .
          pip install --quiet pytest pytest-json-report pytz

          echo "=== Running S3 compatibility tests ==="
          echo ""
          echo "Running core S3 operations tests..."
          echo "Note: Many tests will fail by design (features handled by backend S3)"
          echo ""

          # Discover the test file structure
          echo "Discovering test structure..."
          ls -la
          echo ""
          find . -name "test_s3*.py" -o -name "*test*.py" 2>/dev/null | head -20 || true
          echo ""

          # Find the correct test file path
          TEST_FILE=$(find . -path "*/functional/test_s3.py" -o -path "*/boto3/test_s3.py" 2>/dev/null | head -1)
          if [ -z "$TEST_FILE" ]; then
            # Try alternative locations
            TEST_FILE=$(find . -name "test_s3.py" 2>/dev/null | head -1)
          fi

          if [ -z "$TEST_FILE" ]; then
            echo "ERROR: Could not find test_s3.py in the repository"
            echo "Repository structure:"
            find . -type f -name "*.py" | head -30
            exit 1
          fi

          echo "Found test file at: $TEST_FILE"
          echo ""

          # Test patterns for proxy-relevant operations:
          # - Bucket operations: list, create, delete, head
          # - Object operations: put, get, delete, head, metadata
          # - Multipart uploads
          # - Copy operations
          # - Range requests
          #
          # Excluded tests (features delegated to backend or not supported):
          # - ACL tests (acl, grant, canned_acl)
          # - Policy tests (policy)
          # - Versioning tests (versioning, version)
          # - Anonymous access tests (anon, anonymous, public)
          # - Checksum algorithms (checksum, crc32, sha256, sha1)
          # - Object lock (object_lock, retention, legal_hold)
          # - Website/CORS (website, cors)
          # - Lifecycle (lifecycle, expiration)
          # - SSE/encryption tests that conflict (sse_s3, sse_c, sse_kms)
          # Exclude tests for features we don't support or delegate to backend
          # - ACL/policy/versioning: delegated to backend
          # - Multi-object delete key limit: backend specific limitation
          # - Multipart validation errors: MinIO returns 404 instead of 400
          # - PartsCount: advanced multipart feature not supported
          # - Extended headers: rgw-specific headers
          # - return_data: requires GetObjectAcl which is delegated
          # - put_object_current: versioning-dependent conditional PUT
          # - multipart_copy_special_names: SigV4 mismatch with URL-encoded special chars
          # - delimiter_percentage, delimiter_prefix_ends_with_delimiter,
          #   delimiter_prefix_underscore, delimiter_unreadable: MinIO NextMarker quirks
          # Note: Conditional headers (if*) are only implemented for GET, not PUT/complete_multipart
          EXCLUDE_PATTERN="acl or policy or versioning or version or anon or anonymous or public or \
          checksum or crc32 or sha256 or sha1 or object_lock or retention or legal_hold or \
          website or cors or lifecycle or expiration or sse_s3 or sse_c or sse_kms or \
          grant or canned or encryption or \
          ownership or torrent or unordered or attributes or \
          not_owned or nonowner or rgw or \
          key_limit or \
          upload_empty or size_too_small or missing_part or incorrect_etag or \
          get_part or extended or return_data or \
          put_object_ifmatch or put_object_ifnonmatch or put_object_if_match or put_object_if_none or \
          multipart_put_object_if or multipart_put_current or \
          put_object_current or \
          multipart_copy_special_names or \
          delimiter_percentage or delimiter_prefix_ends_with_delimiter or \
          delimiter_prefix_underscore or delimiter_unreadable"

          TEST_PATTERN="((test_bucket_list) or \
          (test_bucket_create) or \
          (test_bucket_delete) or \
          (test_bucket_head) or \
          (test_object_write) or \
          (test_object_read) or \
          (test_object_head) or \
          (test_get_obj) or \
          (test_put_obj) or \
          (test_multipart) or \
          (test_object_copy) or \
          (test_ranged) or \
          (test_multi_object_delete)) and not ($EXCLUDE_PATTERN)"

          # Run tests and capture results
          echo ""
          echo "Running S3 compatibility tests with pattern matching..."
          echo "Pattern: tests for bucket ops, object ops, multipart, copy, range requests"
          echo "(excluding ACL and policy tests which are delegated to backend)"
          echo ""

          pytest "$TEST_FILE" \
            -k "$TEST_PATTERN" \
            --json-report --json-report-file=/results/report.json \
            -v --tb=short 2>&1 | tee /results/output.txt || true

          echo ""
          echo "=== Test Results Summary ==="

          # Parse and display results
          python3 << 'PYTHON'
          import json
          import sys

          try:
              with open('/results/report.json') as f:
                  report = json.load(f)

              summary = report.get('summary', {})
              passed = summary.get('passed', 0)
              failed = summary.get('failed', 0)
              error = summary.get('error', 0)
              skipped = summary.get('skipped', 0)
              total = summary.get('total', 0)

              print(f"\nTotal:   {total}")
              print(f"Passed:  {passed}")
              print(f"Failed:  {failed}")
              print(f"Error:   {error}")
              print(f"Skipped: {skipped}")

              if failed > 0 or error > 0:
                  print("\n=== Failed Tests ===")
                  for test in report.get('tests', []):
                      if test.get('outcome') in ('failed', 'error'):
                          print(f"\n❌ {test.get('nodeid')}")
                          call = test.get('call', {})
                          if call.get('longrepr'):
                              # Print just the last part of the error
                              lines = str(call['longrepr']).split('\n')
                              for line in lines[-5:]:
                                  print(f"   {line}")

              # Save summary for easy access
              with open('/results/summary.txt', 'w') as f:
                  f.write(f"passed={passed}\n")
                  f.write(f"failed={failed}\n")
                  f.write(f"error={error}\n")
                  f.write(f"total={total}\n")

          except Exception as e:
              print(f"Error parsing results: {e}")
              sys.exit(1)
          PYTHON

          echo ""
          echo "=== S3 Compatibility Test Complete ==="
        resources:
          requests:
            memory: 512Mi
            cpu: 500m
          limits:
            memory: 1Gi
            cpu: 2
      volumes:
      - name: config
        configMap:
          name: s3-tests-config
      - name: results
        emptyDir: {}
