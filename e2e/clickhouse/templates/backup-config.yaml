apiVersion: v1
kind: ConfigMap
metadata:
  name: clickhouse-backup-config
data:
  config.yml: |
    general:
      remote_storage: s3
      disable_progress_bar: true
      backups_to_keep_local: 0
      backups_to_keep_remote: 3
    clickhouse:
      host: localhost
      port: 9000
      username: default
      password: ""
    s3:
      endpoint: http://s3-gateway.s3proxy:80
      bucket: clickhouse-backups
      path: backups
      access_key: minioadmin
      secret_key: minioadmin
      force_path_style: true
      disable_ssl: true
