services:
  redis:
    image: redis:7-alpine
    container_name: bench-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 2s
      retries: 10

  # Separate benchmark container - no resource contention with proxy
  benchmark:
    image: python:3.13-slim
    container_name: bench-client
    working_dir: /bench
    volumes:
      - ./bench.py:/bench/bench.py:ro
    environment:
      MINIO_ENDPOINT: http://minio:9000
      PROXY_ENDPOINT: http://s3proxy:4433
      AWS_ACCESS_KEY_ID: benchmarkadminuser
      AWS_SECRET_ACCESS_KEY: benchmarkadminpassword
    depends_on:
      s3proxy:
        condition: service_healthy
      minio:
        condition: service_healthy
    # Install deps and sleep to keep container running
    command: >
      bash -c "pip install -q aioboto3 && tail -f /dev/null"
    healthcheck:
      test: ["CMD", "python", "-c", "import aioboto3"]
      interval: 5s
      timeout: 10s
      retries: 10
      start_period: 15s

  minio:
    image: minio/minio:latest
    container_name: bench-minio
    ports:
      - "9000:9000"   # S3 API (baseline tests hit this directly)
      - "9001:9001"   # Console
    environment:
      # Credentials must be 16+ chars for AWS SDK compatibility
      MINIO_ROOT_USER: benchmarkadminuser
      MINIO_ROOT_PASSWORD: benchmarkadminpassword
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 2s
      timeout: 2s
      retries: 10

  s3proxy:
    image: s3proxy:latest
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: bench-s3proxy
    ports:
      - "8080:4433"   # Proxy tests hit this
    environment:
      S3PROXY_HOST: http://minio:9000
      S3PROXY_REGION: us-east-1
      S3PROXY_ENCRYPT_KEY: benchmark-test-key-32-bytes-!!
      AWS_ACCESS_KEY_ID: benchmarkadminuser
      AWS_SECRET_ACCESS_KEY: benchmarkadminpassword
      # Higher limits for benchmarking
      S3PROXY_MAX_CONCURRENT_UPLOADS: "50"
      S3PROXY_MAX_CONCURRENT_DOWNLOADS: "50"
      S3PROXY_NO_TLS: "true"
      S3PROXY_LOG_LEVEL: WARNING  # Reduce log noise during benchmarks
      S3PROXY_REDIS_URL: redis://redis:6379/0
    depends_on:
      minio:
        condition: service_healthy
      redis:
        condition: service_healthy
    # Required for py-spy profiling
    cap_add:
      - SYS_PTRACE
    mem_limit: 512m
    memswap_limit: 512m
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4433/readyz"]
      interval: 2s
      timeout: 5s
      retries: 10

  # Profiler container - runs py-spy against s3proxy
  profiler:
    image: python:3.13-slim
    container_name: bench-profiler
    pid: "service:s3proxy"  # Share PID namespace to profile s3proxy
    cap_add:
      - SYS_PTRACE
    volumes:
      - ./results:/results
    command: >
      bash -c "apt-get update && apt-get install -y -qq procps && pip install -q py-spy && tail -f /dev/null"
    depends_on:
      s3proxy:
        condition: service_healthy
