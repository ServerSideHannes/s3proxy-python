name: OOM Proof Test

on:
  push:
    branches: [main]
    paths:
      - 's3proxy/**'
      - 'tests/**'
  workflow_dispatch:

jobs:
  oom-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'
          cache: 'pip'

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync --extra dev

      - name: OOM proof test (256MB container)
        run: make test-oom
