name: Tests

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - 's3proxy/**'
      - 'tests/**'
      - 'pyproject.toml'
  workflow_dispatch:

jobs:
  tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'
          cache: 'pip'

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run all tests
        run: make test-all

      - name: OOM proof test (128MB container)
        run: make test-oom
