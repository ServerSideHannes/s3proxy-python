name: Lint

on:
  push:

jobs:
  ruff:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - name: Install ruff
        run: pipx install ruff

      - name: Ruff check
        run: ruff check .

      - name: Ruff format
        run: ruff format --check .
