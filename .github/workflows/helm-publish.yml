name: Package and Push Helm Chart

on:
  push:
    branches: [main]
    tags: ['v*']

jobs:
  helm-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Helm
        uses: azure/setup-helm@v4.3.1

      - name: Log in to Container Registry
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Add Helm dependency repositories
        run: |
          helm repo add dandydev https://dandydeveloper.github.io/charts
          helm repo update

      - name: Update Helm dependencies
        run: |
          helm dependency update manifests/

      - name: Get version
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION=${GITHUB_REF#refs/tags/v}
          else
            VERSION="0.0.0-latest"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Update chart version
        run: |
          sed -i "s/^version:.*/version: ${{ steps.version.outputs.version }}/" manifests/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"${{ steps.version.outputs.version }}\"/" manifests/Chart.yaml

      - name: Lint Helm chart
        run: |
          helm lint manifests/

      - name: Package Helm chart
        run: |
          helm package manifests/ --destination .

      - name: Push Helm chart to OCI registry
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          helm push s3proxy-python-${{ steps.version.outputs.version }}.tgz oci://ghcr.io/${OWNER}/charts
