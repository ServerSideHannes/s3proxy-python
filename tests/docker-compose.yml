services:
  redis:
    image: redis:7-alpine
    container_name: s3proxy-test-redis
    ports:
      - "6379:6379"

  minio:
    image: minio/minio
    container_name: s3proxy-test-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"

  s3proxy:
    profiles: ["oom"]
    build:
      context: ../
      dockerfile: Dockerfile
    container_name: s3proxy-test-server
    mem_limit: 128m
    ports:
      - "4433:4433"
    environment:
      S3PROXY_ENCRYPT_KEY: "test-encryption-key-32-bytes!!"
      S3PROXY_HOST: "http://minio:9000"
      S3PROXY_REGION: "us-east-1"
      S3PROXY_MEMORY_LIMIT_MB: "16"
      S3PROXY_LOG_LEVEL: "WARNING"
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
    depends_on:
      - minio
