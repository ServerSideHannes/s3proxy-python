services:
  redis:
    image: redis:7-alpine
    container_name: s3proxy-test-redis
    ports:
      - "6379:6379"

  minio:
    image: minio/minio
    container_name: s3proxy-test-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
